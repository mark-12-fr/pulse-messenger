<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <title>Tea 🍵</title>
  <meta name="description" content="Tea — chat, share &amp; connect in real time." />

  <!-- PWA / install -->
  <link rel="manifest" href="/manifest.webmanifest" />
  <link rel="icon" href="/icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Tea" />
  <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0a0a0f" media="(prefers-color-scheme: dark)" />

  <!-- apply saved/system theme before first paint (no flash) -->
  <script>
    (function () {
      try {
        var t = localStorage.getItem('tea_theme');
        if (t !== 'light' && t !== 'dark') t = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', t);
        // if a session exists, show the loading splash instead of flashing the login page
        if (localStorage.getItem('pulse_token')) document.documentElement.classList.add('resume');
      } catch (e) { document.documentElement.setAttribute('data-theme', 'dark'); }
    })();
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/styles.css?v=20260616g" />
</head>
<body>

  <!-- splash shown while resuming a saved session (no login-page flash) -->
  <div id="splash" class="splash">
    <div class="splash-logo">🍵</div>
    <div class="splash-ring"></div>
  </div>

  <!-- ============================== AUTH SCREEN ============================== -->
  <div id="auth-screen" class="auth-screen">
    <div class="auth-card">
      <div class="auth-brand">
        <div class="auth-logo">🍵</div>
        <h1>Tea</h1>
      </div>

      <div class="auth-tabs">
        <button class="auth-tab active" data-mode="login">Log in</button>
        <button class="auth-tab" data-mode="register">Sign up</button>
      </div>

      <form id="auth-form" class="auth-form" autocomplete="off">
        <div class="field field-register">
          <label>Display name</label>
          <input type="text" id="f-displayname" maxlength="40" />
        </div>
        <div class="field">
          <label>Username</label>
          <input type="text" id="f-username" maxlength="20" />
        </div>
        <div class="field">
          <label>Password</label>
          <div class="pw-wrap">
            <input type="password" id="f-password" />
            <button type="button" class="pw-toggle" id="pw-toggle" aria-label="Show password"></button>
          </div>
        </div>

        <div id="auth-error" class="auth-error"></div>

        <button type="submit" id="auth-submit" class="btn-primary btn-block">Log in</button>
      </form>

      <p class="auth-switch">
        <span class="for-login">New here? <a href="#" data-switch="register">Create an account</a></span>
        <span class="for-register">Already have an account? <a href="#" data-switch="login">Log in</a></span>
      </p>
    </div>
  </div>

  <!-- ============================== APP SCREEN ============================== -->
  <div id="app-screen" class="app-screen hidden">
    <!-- Sidebar -->
    <aside class="sidebar" id="sidebar">
      <header class="sidebar-head">
        <div class="me">
          <div class="avatar" id="me-avatar"></div>
          <div class="me-info">
            <div class="me-name" id="me-name"></div>
            <div class="me-username" id="me-username"></div>
          </div>
        </div>
        <div class="head-actions">
          <button class="icon-btn" id="new-group-btn" title="New group" aria-label="New group">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 12a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Zm-7 8a7 7 0 0 1 14 0v.5H5V20Zm14.5-9H21v2h-1.5v1.5H18V13h-1.5v-1.5H18V10h1.5v1Z"/></svg>
          </button>
          <button class="icon-btn" id="settings-btn" title="Settings" aria-label="Settings">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 15.5a3.5 3.5 0 1 1 0-7 3.5 3.5 0 0 1 0 7Zm7.43-2.53c.04-.32.07-.64.07-.97s-.03-.66-.07-.98l2.11-1.65a.5.5 0 0 0 .12-.64l-2-3.46a.5.5 0 0 0-.61-.22l-2.49 1a7.3 7.3 0 0 0-1.69-.98l-.38-2.65a.49.49 0 0 0-.49-.42h-4a.49.49 0 0 0-.49.42l-.38 2.65c-.61.25-1.17.59-1.69.98l-2.49-1a.5.5 0 0 0-.61.22l-2 3.46a.5.5 0 0 0 .12.64l2.11 1.65c-.04.32-.07.65-.07.98s.03.65.07.97l-2.11 1.66a.5.5 0 0 0-.12.64l2 3.46c.14.24.42.32.61.22l2.49-1c.52.39 1.08.73 1.69.98l.38 2.65c.04.24.25.42.49.42h4c.24 0 .45-.18.49-.42l.38-2.65c.61-.25 1.17-.59 1.69-.98l2.49 1c.19.1.47.02.61-.22l2-3.46a.5.5 0 0 0-.12-.64l-2.11-1.66Z"/></svg>
          </button>
          <button class="icon-btn" id="logout-btn" title="Log out" aria-label="Log out">
            <svg viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M16 17v-3H9v-4h7V7l5 5-5 5M14 2a2 2 0 0 1 2 2v2h-2V4H5v16h9v-2h2v2a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9Z"/></svg>
          </button>
        </div>
      </header>

      <div class="search-wrap">
        <svg class="search-icon" viewBox="0 0 24 24" width="18" height="18"><path fill="currentColor" d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.52 6.52 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5Z"/></svg>
        <input type="text" id="search-input" placeholder="Search people to add…" />
        <button class="search-clear hidden" id="search-clear" aria-label="Clear">✕</button>
      </div>

      <nav class="tabs">
        <button class="tab active" data-tab="chats">Chats</button>
        <button class="tab" data-tab="friends">Friends</button>
        <button class="tab" data-tab="requests">Requests <span class="badge hidden" id="req-badge">0</span></button>
      </nav>

      <div class="list-scroll">
        <div id="search-results" class="panel hidden"></div>
        <div id="tab-chats" class="panel"></div>
        <div id="tab-friends" class="panel hidden"></div>
        <div id="tab-requests" class="panel hidden"></div>
      </div>
    </aside>

    <!-- Chat area -->
    <main class="chat" id="chat">
      <!-- Empty state -->
      <div class="chat-empty" id="chat-empty">
        <div class="chat-empty-art">💬</div>
        <h2>Your messages</h2>
        <p>Select a friend to start a real-time conversation.</p>
      </div>

      <!-- Active conversation -->
      <div class="chat-active hidden" id="chat-active">
        <header class="chat-head">
          <button class="icon-btn back-btn" id="back-btn" aria-label="Back">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M15.41 7.41 14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
          </button>
          <div class="avatar" id="peer-avatar"></div>
          <div class="chat-peer">
            <div class="chat-peer-name" id="peer-name"></div>
            <div class="chat-peer-status" id="peer-status"></div>
          </div>
          <button class="icon-btn chat-search-btn" id="chat-search-btn" aria-label="Search messages">
            <svg viewBox="0 0 24 24" width="21" height="21"><path fill="currentColor" d="M9.5 3A6.5 6.5 0 0 1 16 9.5c0 1.61-.59 3.09-1.56 4.23l.27.27h.79l5 5-1.5 1.5-5-5v-.79l-.27-.27A6.52 6.52 0 0 1 9.5 16 6.5 6.5 0 0 1 3 9.5 6.5 6.5 0 0 1 9.5 3m0 2C7 5 5 7 5 9.5S7 14 9.5 14 14 12 14 9.5 12 5 9.5 5Z"/></svg>
          </button>
          <button class="icon-btn chat-more" id="chat-more-btn" aria-label="More options">
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M12 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4Zm0 2a2 2 0 1 0 0 4 2 2 0 0 0 0-4Zm0 6a2 2 0 1 0 0 4 2 2 0 0 0 0-4Z"/></svg>
          </button>
        </header>

        <div class="pin-bar hidden" id="pin-bar"></div>

        <div class="messages" id="messages"></div>

        <button class="scroll-bottom hidden" id="scroll-bottom" aria-label="Scroll to latest">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M19 12l-7 7-7-7"/></svg>
          <span class="sb-count hidden" id="sb-count"></span>
        </button>

        <div class="typing-row" id="typing-row"><span class="typing-dots"><i></i><i></i><i></i></span> <span id="typing-text"></span></div>

        <div id="reply-bar" class="reply-bar hidden">
          <div class="reply-bar-main">
            <div class="reply-bar-label" id="reply-bar-label"></div>
            <div class="reply-bar-text" id="reply-bar-text"></div>
          </div>
          <button class="icon-btn" id="reply-cancel" aria-label="Cancel reply">✕</button>
        </div>

        <div class="mention-pop hidden" id="mention-pop"></div>

        <div class="select-bar hidden" id="select-bar">
          <button class="icon-btn" id="sel-cancel" aria-label="Cancel selection">✕</button>
          <span class="sel-count" id="sel-count">0 selected</span>
          <div class="sel-actions">
            <button class="sel-act" id="sel-forward">Forward</button>
            <button class="sel-act danger" id="sel-delete">Delete</button>
          </div>
        </div>

        <div class="composer">
          <input type="file" id="file-input" hidden multiple accept="image/*,video/*,.pdf,.doc,.docx,.txt,.zip" />
          <input type="file" id="camera-input" hidden accept="image/*" capture="environment" />
          <button class="icon-btn attach-btn" id="attach-btn" title="Attach photo / video / file" aria-label="Attach">
            <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M16.5 6v11.5a4 4 0 0 1-8 0V5a2.5 2.5 0 0 1 5 0v10.5a1 1 0 0 1-2 0V6H10v9.5a2.5 2.5 0 0 0 5 0V5a4 4 0 0 0-8 0v12.5a5.5 5.5 0 0 0 11 0V6h-1.5Z"/></svg>
          </button>
          <div class="composer-input-wrap">
            <div id="attach-preview" class="attach-preview hidden"></div>
            <textarea id="message-input" rows="1" placeholder="Message…" maxlength="5000"></textarea>
          </div>
          <button class="send-btn" id="send-btn" title="Send" aria-label="Send" disabled>
            <svg viewBox="0 0 24 24" width="22" height="22"><path fill="currentColor" d="M3.4 20.4 21 12 3.4 3.6 3 10l13 2-13 2 .4 6.4Z"/></svg>
          </button>
        </div>
      </div>
    </main>
  </div>

  <!-- Lightbox for image/video preview -->
  <div id="lightbox" class="lightbox hidden">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">✕</button>
    <button class="lightbox-dl" id="lightbox-download" aria-label="Save to device" title="Save">
      <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3v12M7 10l5 5 5-5M5 21h14"/></svg>
    </button>
    <div class="lightbox-body" id="lightbox-body"></div>
  </div>

  <!-- Toast notifications -->
  <div id="toasts" class="toasts"></div>

  <script src="https://cdn.socket.io/4.7.5/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode-generator@1.4.4/qrcode.js"></script>
  <script src="/config.js"></script>
  <script src="/app.js?v=20260616g"></script>
</body>
</html>
